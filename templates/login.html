{% extends "base.html" %}
{% block title %}Login - Food Rescue Network{% endblock %}

{% block content %}
<div
    style="background:linear-gradient(135deg,#f4f6f4,#e8f5e9);min-height:calc(100vh - 70px);display:flex;align-items:center;padding:3rem 0;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="auth-card">
                    <div class="auth-header">
                        <div
                            style="width:56px;height:56px;background:rgba(255,255,255,0.15);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 1rem;">
                            <i class="bi bi-shield-lock-fill"></i>
                        </div>
                        <h4 style="font-family:'Poppins',sans-serif;font-weight:800;margin-bottom:4px;">Welcome Back!
                        </h4>
                        <p style="opacity:0.75;font-size:0.88rem;margin:0;">Sign in to your FoodRescue account</p>
                    </div>
                    <div class="auth-body">
                        <form action="{{ url_for('login') }}" method="POST" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"
                                        style="background:#fafafa;border-right:none;border-radius:10px 0 0 10px;"><i
                                            class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" class="form-control" name="email" required
                                        placeholder="name@domain.com"
                                        style="border-left:none;border-radius:0 10px 10px 0;">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"
                                        style="background:#fafafa;border-right:none;border-radius:10px 0 0 10px;"><i
                                            class="bi bi-lock text-muted"></i></span>
                                    <input type="password" class="form-control" name="password" required
                                        placeholder="••••••••" style="border-left:none;border-radius:0 10px 10px 0;">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2 fw-bold">
                                Sign In <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                        </form>
                        <p class="text-center text-muted mt-3 mb-0" style="font-size:0.88rem;">
                            Don't have an account? <a href="{{ url_for('register') }}"
                                class="text-orange fw-bold text-decoration-none">Register here</a>
                        </p>
                    </div>
                </div>


            </div>
        </div>
    </div>
</div>
{% endblock %}
